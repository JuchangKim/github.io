<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me - Juchang Kim</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="about.html" class="nav-item">About</a>
            <a href="skills.html" class="nav-item">Skills</a>
            <a href="projects.html" class="nav-item">Projects</a>
            <a href="contact.html" class="nav-item active">Contact</a>
        </div>
    </nav>

    <main class="main-container">
        <header class="hero-card">
            <h1>Let's Connect</h1>
            <p class="hero-bio">
                I am currently based in Auckland and open to discussing roles in any jobs which align with my skills and interests.
            </p>
        </header>

        <div class="contact-grid">
            <section class="section-card">
                <h2>Contact Information</h2>
                <div class="contact-methods">
                    <a href="mailto:brad193026@gmail.com" class="contact-link">
                        <i class="fas fa-envelope"></i> brad193026@gmail.com
                    </a>
                    <a href="https://www.linkedin.com/in/juchang-kim/" target="_blank" class="contact-link">
                        <i class="fab fa-linkedin"></i> LinkedIn Profile
                    </a>
                    <a href="https://github.com/JuchangKim" target="_blank" class="contact-link">
                        <i class="fab fa-github"></i> GitHub Portfolio
                    </a>
                </div>
            </section>

            <section class="section-card">
                <h2>Send a Message</h2>
                <form class="modern-form">
                    <div class="form-group">
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="How can I help you?" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Juchang Kim. Built with CSS.</p>
    </footer>
</body>
</html>
